services:
  # RSSHub: foreign-feed adapter (Stage 3). Disabled by default;
  # enable by setting `rsshub.enabled: true` in config.yml AND including
  # this service in `docker compose up` (it always starts but the
  # aggregator only consumes it when configured).
  #
  # If RSSHub needs to reach blocked sites, set RSSHUB_PROXY_URI in .env
  # (e.g. http://host.docker.internal:1080 on Docker Desktop, or the
  # IP/port of an HTTP proxy reachable from the docker bridge).
  rsshub:
    image: diygod/rsshub:latest
    container_name: hotbrief-rsshub
    restart: unless-stopped
    environment:
      NODE_ENV: production
      CACHE_TYPE: memory
      CACHE_EXPIRE: "300"
      PROXY_URI: "${RSSHUB_PROXY_URI:-}"
      TZ: "Asia/Shanghai"
    # Use a node-based healthcheck because the upstream image's busybox
    # wget behaves inconsistently across versions; node is always present.
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://127.0.0.1:1200/healthz', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s

  dailyhotapi:
    image: imsyy/dailyhot-api:latest
    container_name: hotbrief-dailyhotapi
    restart: unless-stopped
    # Bind to localhost only on the host, so DailyHotApi is never exposed publicly.
    # Other containers reach it through the internal compose network as
    # http://dailyhotapi:6688
    ports:
      - "127.0.0.1:6688:6688"
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://127.0.0.1:6688/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s

  aggregator:
    build:
      context: ./aggregator
      # Mainland-China-friendly mirrors. Override or unset for upstream builds.
      args:
        APT_MIRROR: "http://mirrors.tuna.tsinghua.edu.cn"
        NPM_REGISTRY: "https://registry.npmmirror.com"
    container_name: hotbrief-aggregator
    restart: unless-stopped
    depends_on:
      dailyhotapi:
        condition: service_healthy
      rsshub:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DAILYHOTAPI_URL: "http://dailyhotapi:6688"
      CONFIG_PATH: "/app/config.yml"
      DATA_DIR: "/app/data"
      TZ: "Asia/Shanghai"
      FOREIGN_HTTPS_PROXY: "${FOREIGN_HTTPS_PROXY:-}"
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./data:/app/data
