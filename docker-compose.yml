services:
  dailyhotapi:
    image: imsyy/dailyhot-api:latest
    container_name: hotbrief-dailyhotapi
    restart: unless-stopped
    # Bind to localhost only on the host, so DailyHotApi is never exposed publicly.
    # Other containers reach it through the internal compose network as
    # http://dailyhotapi:6688
    ports:
      - "127.0.0.1:6688:6688"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:6688/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  aggregator:
    build:
      context: ./aggregator
      # Mainland-China-friendly mirrors. Override or unset for upstream builds.
      args:
        APT_MIRROR: "http://mirrors.tuna.tsinghua.edu.cn"
        NPM_REGISTRY: "https://registry.npmmirror.com"
    container_name: hotbrief-aggregator
    restart: unless-stopped
    depends_on:
      dailyhotapi:
        condition: service_started
    env_file:
      - .env
    environment:
      DAILYHOTAPI_URL: "http://dailyhotapi:6688"
      CONFIG_PATH: "/app/config.yml"
      DATA_DIR: "/app/data"
      TZ: "Asia/Shanghai"
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./data:/app/data
